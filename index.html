// ── Supabase helpers ──────────────────────────
function sbH(extra={}){
  return {"apikey":SUPA_KEY,"Authorization":"Bearer "+SUPA_KEY,"Content-Type":"application/json",...extra};
}
async function sbGet(table,params=""){
  const res=await fetch(SUPA_URL+"/rest/v1/"+table+"?"+params,{headers:sbH()});
  if(!res.ok)throw new Error(await res.text());
  return res.json();
}
async function sbUpsert(table,data){
  const body=Array.isArray(data)?data:[data];
  const res=await fetch(SUPA_URL+"/rest/v1/"+table,{
    method:"POST",
    headers:sbH({"Prefer":"resolution=merge-duplicates,return=representation"}),
    body:JSON.stringify(body)
  });
  if(!res.ok)throw new Error(await res.text());
  return res.json();
}
async function sbDelete(table,id){
  const res=await fetch(SUPA_URL+"/rest/v1/"+table+"?id=eq."+id,{
    method:"DELETE",headers:sbH()
  });
  if(!res.ok)throw new Error(await res.text());
  return true;
}
async function sbPatch(table,id,data){
  const res=await fetch(SUPA_URL+"/rest/v1/"+table+"?id=eq."+id,{
    method:"PATCH",
    headers:sbH({"Prefer":"return=representation"}),
    body:JSON.stringify(data)
  });
  if(!res.ok)throw new Error(await res.text());
  return res.json();
}

function hashPass(p){let h=5381;for(let i=0;i<p.length;i++)h=Math.imul(h^p.charCodeAt(i),0x9e3779b1)>>>0;return h.toString(36);}
function getSession(){
  try{
    const s=JSON.parse(localStorage.getItem("plSession")||"null");
    if(!s)return null;
    const TIMEOUT=30*60*1000; // 30 นาที
    if(Date.now()-s._sa>TIMEOUT){clearSession();return null;}
    return s;
  }catch(e){return null;}
}

function pad(n){return String(n).padStart(2,"0");}
function fmt(n){return(+n||0).toLocaleString("th-TH",{minimumFractionDigits:2,maximumFractionDigits:2});}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function today(){const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}

// ── NTP ──────────────────────────────────────────────
let _ofs=0,_rdy=false;
function syncNTP(){
  if(location.protocol==="file:")return;
  fetch("https://worldtimeapi.org/api/timezone/Asia/Bangkok")
    .then(r=>r.json()).then(j=>{_ofs=new Date(j.datetime).getTime()-Date.now();_rdy=true;})
    .catch(()=>{});
}
function now(){return new Date(Date.now()+_ofs);}
function timeStr(){const d=now();return pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds());}
function dateStr(){const d=now();return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}

// ── Record / Product init ─────────────────────────────
function RINIT(){return{id:null,date:today(),type:"รายจ่าย",parcelNo:"",trackNo:"",parcelQty:1,totalItems:1,useCNY:false,amountCNY:"",rateUsed:S.rate||"5",amount:"",shipCNTH:"",shipTHStore:"",supplier:"",orderRef:"",orderDate:"",note:"",status:"สั่งซื้อ",customStatus:"",images:[],_fm:false,_pid:null,_mk:false,_sp:false,_setCost:false,_setSale:false};}
function PINIT(){return{id:Date.now(),name:"",sku:"",category:"",unit:"ชิ้น",costPrice:"",salePrice:"",stock:0,minStock:5,note:"",createdAt:today()};}

// ── Cost calculation ──────────────────────────────────
function cost(r){
  const amt=r.useCNY&&r.amountCNY?(+r.amountCNY*(+r.rateUsed||+S.rate||1)):(+r.amount||0);
  const tot=amt+(+r.shipCNTH||0)+(+r.shipTHStore||0);
  const n=Math.max(1,+r.totalItems||1);
  return{tot,per:tot/n,amt};
}

    // โหลด records
    const recRows=await sbGet("records","select=*&order=date.desc");

      S.recs=recRows.map((r,i)=>({...RINIT(),
        id:r.id,date:r.date,type:r.type,

        orderDate:r.order_date,note:r.note,status:r.status,

        ...(r.meta||{})

    }

        minStock:r.min_stock,note:r.note,createdAt:r.created_at

}

function checkUname(el){

  else if(v.length<3){h.style.color="#F59E0B";h.textContent="ต้องมีอย่างน้อย 3 ตัวอักษร";}
  else{h.style.color="#059669";h.textContent="";}

function checkEmail(el){
  const v=el.value.trim(),h=document.getElementById("email-hint");
  if(!h)return;
  if(!v){h.textContent="";return;}
  const ok=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  const isGmail=v.toLowerCase().endsWith("@gmail.com");
  if(!ok){h.style.color="#DC2626";h.textContent="รูปแบบอีเมลไม่ถูกต้อง";}
  else if(!isGmail){h.style.color="#94A3B8";h.textContent="แนะนำใช้ @gmail.com";}
  else{h.style.color="#059669";h.textContent="";}
}
function checkPwd(el){
  const v=el.value,b=document.getElementById("pwd-bar"),h=document.getElementById("pwd-hint");
  let score=0,tips=[];
  if(v.length>=6)score++;
  if(v.length>=8)score++;
  if(/[A-Z]/.test(v))score++;
  if(/[0-9]/.test(v))score++;
  if(/[^a-zA-Z0-9]/.test(v))score++;
  if(v.length<6){h.style.color="#DC2626";h.textContent="ต้องมีอย่างน้อย 6 ตัวอักษร";}
  else if(score<=2){h.style.color="#F59E0B";h.textContent="ลองเพิ่มตัวเลขหรือตัวพิมพ์ใหญ่";}
  else if(score<=3){h.style.color="#64748B";h.textContent="รหัสผ่านพอใช้";}
  else{h.style.color="#059669";h.textContent="รหัสผ่านแข็งแกร่ง";}
  const colors=["#E2E8F0","#DC2626","#F59E0B","#0369A1","#059669","#059669"];
  if(b){b.style.width=(score/5*100)+"%";b.style.background=colors[score]||"#E2E8F0";}
  checkPwd2(document.getElementById("rgp2"));
}

const gv=id=>(document.getElementById(id)?.value||"").trim();
function bindAuth(){
  const li=document.getElementById("libtn");
  if(li)li.onclick=async()=>{
    const u=gv("liu"),p=gv("lip");
    if(!u||!p){aerr("กรุณากรอกข้อมูล");return;}
    li.disabled=true;li.textContent="กำลังตรวจสอบ...";
    try{
      // ── เช็ครหัสผ่านจาก LS ก่อน (เร็ว ไม่ต้องรอ network) ──
      const localUsers=lsUsers();
      const localU=localUsers.find(x=>x.username===u);
      if(localUsers.length>0){
        if(!localU){aerr("ไม่พบชื่อผู้ใช้ — กรุณาสมัครก่อน");li.disabled=false;li.textContent="เข้าสู่ระบบ";return;}
        if(localU.passHash!==hashPass(p)){aerr("รหัสผ่านไม่ถูกต้อง");li.disabled=false;li.textContent="เข้าสู่ระบบ";return;}
      }
      // ── ดึง Sheets เสมอ เพื่อเช็คสถานะล่าสุด (Admin อาจอนุมัติแล้ว) ──
      li.textContent="กำลังตรวจสอบสถานะ...";
      let sheetUsers=[];
      try{
        const rows=await sbGet("users","select=*");
        sheetUsers=rows.map(fromUserRow);
      }catch(e){}
      // ── ใช้ Sheets เป็นหลัก, LS เป็นสำรอง ──
      const merged=sheetUsers.length?sheetUsers:localUsers;
      if(sheetUsers.length){lsSaveUsers(sheetUsers);}
      const u2=merged.find(x=>x.username===u);
      if(!u2){aerr("ไม่พบชื่อผู้ใช้ — กรุณาสมัครก่อน");li.disabled=false;li.textContent="เข้าสู่ระบบ";return;}
      if(u2.passHash!==hashPass(p)){aerr("รหัสผ่านไม่ถูกต้อง");li.disabled=false;li.textContent="เข้าสู่ระบบ";return;}
      if(u2.status==="pending"){
        aerr("บัญชีของคุณรอการอนุมัติจาก Admin กรุณาติดต่อ Admin");
        li.disabled=false;li.textContent="เข้าสู่ระบบ";return;
      }
      if(u2.status==="rejected"){aerr("บัญชีของคุณถูกปฏิเสธ กรุณาติดต่อ Admin");li.disabled=false;li.textContent="เข้าสู่ระบบ";return;}
      S.sess=u2;saveSession(u2);render();
    }catch(e){aerr("เกิดข้อผิดพลาด: "+e.message);li.disabled=false;li.textContent="เข้าสู่ระบบ";}
  };
  const rg=document.getElementById("rgbtn");
  if(rg)rg.onclick=async()=>{
    const name=gv("rgn"),user=gv("rgu"),email=gv("rge"),
          pass=document.getElementById("rgp")?.value||"",
          pass2=document.getElementById("rgp2")?.value||"";
    if(!name.trim()||!user.trim()||!email.trim()||!pass){aerr("กรุณากรอกข้อมูลให้ครบทุกช่อง");return;}
    if(!/^[a-zA-Z0-9_]+$/.test(user.trim())||user.trim().length<3){aerr("ชื่อผู้ใช้: a-z, 0-9, _ เท่านั้น (อย่างน้อย 3 ตัว)");return;}
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){aerr("รูปแบบ Gmail ไม่ถูกต้อง");return;}
    if(pass.length<6){aerr("รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร");return;}
    if(pass!==pass2){aerr("รหัสผ่านและยืนยันรหัสผ่านไม่ตรงกัน");return;}
    rg.style.display="none";
    const sp=document.getElementById("rgsp");if(sp)sp.style.display="block";
    const localUsers=lsUsers();
    if(localUsers.find(x=>x.username===user.trim())){
      aerr("ชื่อผู้ใช้นี้มีอยู่แล้ว");
      rg.style.display="block";if(sp)sp.style.display="none";return;
    }
    const isFirst=localUsers.length===0;
    const nu={id:Date.now(),username:user.trim(),name:name.trim(),email:email.trim(),passHash:hashPass(pass),role:isFirst?"admin":"user",status:isFirst?"approved":"pending",createdAt:today()};
    localUsers.push(nu);lsSaveUsers(localUsers);
    const sbTimeout=(p,ms=8000)=>Promise.race([p,new Promise((_,r)=>setTimeout(()=>r(new Error("timeout")),ms))]);
    if(isFirst){
      S.sess=nu;saveSession(nu);
      sbTimeout(sbUpsert("users",toUserRow(nu))).catch(e=>console.warn("sync user:",e.message));
      render();return;
    }
    try{
      await sbTimeout(sbUpsert("users",toUserRow(nu)));
    }catch(e){
      console.warn("register sync:",e.message);
    }
    S.authScr="pending";render();
  };
}

async function importSales(e,platform){
  const file=e.target.files[0];
  if(!file)return;
  const buf=await file.arrayBuffer();
  const wb=XLSX.read(new Uint8Array(buf),{type:"array"});
  let result=null;
  try{
    if(platform==="Shopee") result=parseShopee(wb);
    else if(platform==="TikTok") result=parseTikTok(wb);
    else if(platform==="Lazada") result=parseLazada(wb);
  }catch(err){
    alert("นำเข้าไม่สำเร็จ: "+err.message);return;
  }
  if(!result){alert("ไม่พบข้อมูลในไฟล์นี้");return;}
  // upsert by platform+month
  result.forEach(r=>{
    const idx=S.salesData.findIndex(d=>d.platform===r.platform&&d.month===r.month);
    if(idx>=0)S.salesData[idx]=r; else S.salesData.push(r);
  });
  saveSalesData();
  // sync to Supabase
  sbUpsert("sales_summary",result).catch(()=>{});
  alert(`✅ นำเข้า ${result.length} เดือน สำเร็จ`);
  render();
}

function parseSalesNum(v){
  if(v===null||v===undefined||v==="-"||v==="")return 0;
  return parseFloat(String(v).replace(/,/g,""))||0;
}

// ── Shopee: ใช้ row summary (R2) แทน sum daily ──
function parseShopee(wb){
  const ws=wb.Sheets["ทั้งหมด"]||wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
  // R2 = summary "01-02-2026-28-02-2026"
  // หา header row ก่อน
  let hIdx=-1;
  for(let i=0;i<rows.length;i++){
    if(rows[i]&&String(rows[i][0]||"").trim()==="วันที่"){hIdx=i;break;}
  }
  if(hIdx<0)throw new Error("ไม่พบ header Shopee");
  const sr=rows[hIdx+1]; // summary row
  if(!sr||!sr[0])throw new Error("ไม่พบ summary row Shopee");
  // parse month จาก "01-02-2026-28-02-2026" → 2026-02
  const ds=String(sr[0]);
  const m=ds.match(/(\d{2})-(\d{2})-(\d{4})/);
  if(!m)throw new Error("parse month ล้มเหลว: "+ds);
  const month=m[3]+"-"+m[2]; // 2026-02
  return [{
    platform:"Shopee",month,
    total_sales:parseSalesNum(sr[1]),
    orders:parseSalesNum(sr[3]),
    cancelled_orders:parseSalesNum(sr[8]),
    cancelled_sales:parseSalesNum(sr[9]),
    refund_orders:parseSalesNum(sr[10]),
    refund_sales:parseSalesNum(sr[11]),
    items_sold:0
  }];
}

// ── TikTok: sum daily rows ──
function parseTikTok(wb){
  const ws=wb.Sheets["Sheet1"]||wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
  // หา header "วันที่"
  let hIdx=-1;
  for(let i=0;i<rows.length;i++){
    if(rows[i]&&String(rows[i][0]||"").trim()==="วันที่"){hIdx=i;break;}
  }
  if(hIdx<0)throw new Error("ไม่พบ header TikTok");
  const acc={};
  for(let i=hIdx+1;i<rows.length;i++){
    const r=rows[i];if(!r||!r[0])continue;
    const ds=String(r[0]); // "2026-02-01"
    const mm=ds.match(/^(\d{4})-(\d{2})/);
    if(!mm)continue;
    const mo=mm[1]+"-"+mm[2];
    if(!acc[mo])acc[mo]={platform:"TikTok",month:mo,total_sales:0,orders:0,cancelled_orders:0,cancelled_sales:0,refund_orders:0,refund_sales:0,items_sold:0};
    acc[mo].total_sales+=parseSalesNum(r[1]);
    acc[mo].refund_sales+=parseSalesNum(r[2]);
    acc[mo].items_sold+=parseSalesNum(r[4]);
    acc[mo].orders+=parseSalesNum(r[9]);
  }
  return Object.values(acc);
}

// ── Lazada: flexible header detection ──
function parseLazada(wb){
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
  let hIdx=-1;
  for(let i=0;i<rows.length;i++){
    const r=rows[i];if(!r)continue;
    const has=r.some(v=>v&&(String(v).toLowerCase().includes("date")||String(v).includes("วันที่")));
    if(has){hIdx=i;break;}
  }
  if(hIdx<0)throw new Error("ไม่พบ header Lazada");
  const headers=rows[hIdx].map(h=>String(h||"").toLowerCase());
  const dateCol=headers.findIndex(h=>h.includes("date")||h.includes("วันที่"));
  const salesCol=headers.findIndex(h=>h.includes("paid")||h.includes("revenue")||h.includes("ยอดขาย"));
  const ordersCol=headers.findIndex(h=>h.includes("order")||h.includes("คำสั่ง"));
  const acc={};
  for(let i=hIdx+1;i<rows.length;i++){
    const r=rows[i];if(!r||!r[dateCol])continue;
    const ds=String(r[dateCol]);
    let mo="";
    const m1=ds.match(/^(\d{4})-(\d{2})/);
    const m2=ds.match(/(\d{2})\/(\d{2})\/(\d{4})/);
    if(m1)mo=m1[1]+"-"+m1[2];
    else if(m2)mo=m2[3]+"-"+m2[2];
    if(!mo)continue;
    if(!acc[mo])acc[mo]={platform:"Lazada",month:mo,total_sales:0,orders:0,cancelled_orders:0,cancelled_sales:0,refund_orders:0,refund_sales:0,items_sold:0};
    acc[mo].total_sales+=salesCol>=0?parseSalesNum(r[salesCol]):0;
    acc[mo].orders+=ordersCol>=0?parseSalesNum(r[ordersCol]):0;
  }
  return Object.values(acc);
}

function readRF(){
  if(!S.recForm)return;

  ["fa","fd","fp","ft","fpq","fti","fs","fpname","for","fod","fcny","frate","fcn","fth","fn","fst","fcs"].forEach(id=>{
    const el=g(id);if(!el)return;
    const key={fa:"amount",fd:"date",fp:"parcelNo",ft:"trackNo",fpq:"parcelQty",fti:"totalItems",fs:"supplier",fpname:"productName","for":"orderRef",fod:"orderDate",fcny:"amountCNY",frate:"rateUsed",fcn:"shipCNTH",fth:"shipTHStore",fn:"note",fst:"status",fcs:"customStatus"}[id];
    if(key)S.recForm[key]=el.value;

function saveRec(){
  readRF();const f=S.recForm;
  if(!f.amount){alert("กรุณากรอกยอดเงิน");return;}
  if(!f.parcelNo)f.parcelNo=(f.type==="รายรับ"?"INC-":"PKG-")+Date.now();
  if(!f.trackNo)f.trackNo="-";
  const rec={...f,id:S.editRecId||Date.now(),amount:+f.amount||0,
    parcelQty:+f.parcelQty||1,totalItems:+f.totalItems||1,
    shipCNTH:+f.shipCNTH||0,shipTHStore:+f.shipTHStore||0,
    amountCNY:f.useCNY?+f.amountCNY:"",rateUsed:f.useCNY?+(f.rateUsed||S.rate):"",
    images:f.images||[]};
  if(S.editRecId)S.recs=S.recs.map(r=>r.id==S.editRecId?rec:r);
  else S.recs=[...S.recs,rec];
  saveR();pushRec(rec);S.recForm=null;S.editRecId=null;render();
}

function handleImg(inp){

  files.slice(0,rem).forEach(file=>{
    const reader=new FileReader();

// ── Barcode Scanner ──
let _scanner = null;
let _scanTarget = null;

function openScanner(targetId) {
  _scanTarget = targetId;
  // สร้าง modal
  const modal = document.createElement('div');
  modal.id = 'scanModal';
  modal.className = 'scan-modal';
  modal.innerHTML = `
    <div class="scan-box">
      <div class="scan-hd">
        <div class="scan-title">📷 สแกนบาร์โค้ด</div>
        <button onclick="closeScanner()" style="background:rgba(255,255,255,.1);border:none;color:#fff;width:28px;height:28px;border-radius:7px;font-size:14px;cursor:pointer;font-family:monospace">✕</button>
      </div>
      <div id="scan-reader"></div>
      <div class="scan-hint">ส่องกล้องไปที่บาร์โค้ด — ระบบจะอ่านให้อัตโนมัติ</div>
    </div>
  `;
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if(e.target === modal) closeScanner(); });

  // เริ่ม scanner
  try {
    _scanner = new Html5Qrcode('scan-reader');
    const config = {
      fps: 15,
      qrbox: { width: 260, height: 120 },
      aspectRatio: 1.5,
      formatsToSupport: [
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.QR_CODE,
        Html5QrcodeSupportedFormats.ITF,
      ]
    };
    _scanner.start(
      { facingMode: 'environment' },
      config,
      (decodedText) => {
        // สแกนสำเร็จ
        const el = document.getElementById(_scanTarget);
        if (el) {
          el.value = decodedText;
          // อัปเดต state
          if (_scanTarget === 'fp' && S.recForm) S.recForm.parcelNo = decodedText;
          if (_scanTarget === 'ft' && S.recForm) S.recForm.trackNo = decodedText;
          // flash สีเขียว
          el.style.borderColor = '#4ADE80';
          el.style.background = '#F0FDF4';
          setTimeout(() => {
            el.style.borderColor = '';
            el.style.background = '';
          }, 1500);
        }
        closeScanner();
        // vibrate
        if(navigator.vibrate) navigator.vibrate(100);
      },
      () => {} // onError — ไม่ต้องทำอะไร
    ).catch(err => {
      console.warn('Scanner start error:', err);
      closeScanner();
      alert('ไม่สามารถเปิดกล้องได้ กรุณาอนุญาตการเข้าถึงกล้อง');
    });
  } catch(e) {
    console.error(e);
    closeScanner();
    alert('browser ไม่รองรับ กรุณาใช้ Chrome บน Android');
  }
}

function closeScanner() {
  if (_scanner) {
    _scanner.stop().catch(() => {}).finally(() => {
      _scanner.clear();
      _scanner = null;
    });
  }
  const modal = document.getElementById('scanModal');
  if (modal) modal.remove();
}
